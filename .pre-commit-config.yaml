default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]
        files: ^(src|tests|tools)/

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        files: ^(src|tests|tools)/

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.8.3
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: bundle-icons
        name: bundle icons
        entry: python tools/bundle_icons.py --check
        language: system
        pass_filenames: false
        files: ^(assets/icons/.*\.svg|src/subsearch/ui/icons_data\.py)$
