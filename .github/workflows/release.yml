name: Release
run-name: Release ${{ github.event.pull_request.title }}


on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  ARTIFACT_RETENTION_DAYS: 7
  RELEASE_BRANCH: main

jobs:
  init:
    name: Version control
    if: ${{ github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release') }}
    runs-on: windows-latest
    timeout-minutes: 10
    outputs:
      bumped: ${{ steps.run.outputs.bumped }}
      current_tag: ${{ steps.run.outputs.current_tag }}
      previous_tag: ${{ steps.run.outputs.previous_tag }}
      msi_name: ${{ steps.run.outputs.msi_name }}
      artifact_id: ${{ steps.run.outputs.artifact_id }}
      validation_run_id: ${{ steps.gate.outputs.validation_run_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_TOKEN }}

      - uses: ./.github/actions/configure-signing
        with:
          signing-key: ${{ secrets.SSH_SIGNING_KEY }}

      - uses: ./.github/actions/setup-python

      - uses: ./.github/actions/install-commitizen

      - name: Require a passing validation for the merged source
        id: gate
        run: python .github/workflows/scripts/jobs.py release_gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Bump version, tag, and push
        id: run
        run: python .github/workflows/scripts/jobs.py init

  fetch_binaries:
    name: Fetch validated binaries
    needs: init
    if: ${{ needs.init.outputs.bumped == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 10
    outputs:
      msi_hash: ${{ steps.run.outputs.msi_hash }}
      exe_hash: ${{ steps.run.outputs.exe_hash }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: ./.github/actions/setup-python

      - name: Download the validated binaries
        uses: actions/download-artifact@v4
        with:
          name: validated_${{ needs.init.outputs.validation_run_id }}
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.init.outputs.validation_run_id }}

      - name: Read hashes from the validated artifact
        id: run
        run: python .github/workflows/scripts/jobs.py read_validated_hashes

      - uses: actions/upload-artifact@v4
        with:
          name: build_${{ needs.init.outputs.artifact_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  upload_binaries:
    name: Upload binaries to virustotal
    needs: [init, fetch_binaries]
    if: ${{ needs.init.outputs.bumped == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: build_${{ needs.init.outputs.artifact_id }}
          path: artifacts

      - uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          github_token: ${{ secrets.ACTIONS_TOKEN }}
          update_release_body: false
          request_rate: 4
          files: |
            artifacts/Subsearch.exe
            artifacts/${{ needs.init.outputs.msi_name }}

  changelog:
    name: Changelog
    needs: [init, fetch_binaries]
    if: ${{ needs.init.outputs.bumped == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/setup-python

      - uses: ./.github/actions/install-commitizen

      - name: Render changelog and append links
        run: python .github/workflows/scripts/jobs.py changelog
        env:
          CURRENT_TAG: ${{ needs.init.outputs.current_tag }}
          PREVIOUS_TAG: ${{ needs.init.outputs.previous_tag }}
          MSI_NAME: ${{ needs.init.outputs.msi_name }}
          MSI_HASH: ${{ needs.fetch_binaries.outputs.msi_hash }}
          EXE_HASH: ${{ needs.fetch_binaries.outputs.exe_hash }}

      - uses: actions/upload-artifact@v4
        with:
          name: changelog_${{ needs.init.outputs.artifact_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  publish_github:
    name: Publish to github
    needs: [init, fetch_binaries, changelog]
    if: ${{ needs.init.outputs.bumped == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.init.outputs.current_tag }}
          tag_name: ${{ needs.init.outputs.current_tag }}
          body_path: artifacts/changelog_${{ needs.init.outputs.artifact_id }}/changelog.md
          token: ${{ secrets.ACTIONS_TOKEN }}
          prerelease: false
          files: |
            artifacts/build_${{ needs.init.outputs.artifact_id }}/hashes.sha256
            artifacts/build_${{ needs.init.outputs.artifact_id }}/${{ needs.init.outputs.msi_name }}

  publish_pypi:
    name: Publish to pypi
    needs: [init, fetch_binaries]
    if: ${{ needs.init.outputs.bumped == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install build and twine
        run: |
          git fetch origin main
          python -m pip install --upgrade --disable-pip-version-check pip build twine

      - name: Build wheel and source distributions
        run: python -m build

      - name: Upload to pypi
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload --verbose -u '__token__' dist/*

  sync_dev:
    name: Fast-forward dev to main
    needs: [init, publish_github, publish_pypi]
    if: ${{ needs.init.outputs.bumped == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-python

      - run: python .github/workflows/scripts/jobs.py sync_dev
