name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CLI: python -m tools.github_actions.cli.commands
  PYTHON_VERSION: "3.14"
  ARTIFACT_RETENTION_DAYS: 7
  TIMEOUT_MINUTES: 10
  RUNS_ON: windows-latest
  VERSION_CONTROL_PATH: ".github/configs/version_control.json"
  VERSION_PY_PATH: "src/subsearch/data/version.py"
  HASHES_NAME: "hashes.sha256"
  CHANGELOG_NAME: "changelog.md"

jobs:
  init:
    name: Version control
    # Skip the run triggered by our own release commit to avoid a loop.
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    runs-on: windows-latest
    timeout-minutes: 10
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
      current_tags: ${{ steps.bump.outputs.current }}
      previous_tags: ${{ steps.bump.outputs.previous }}
      last_stable_release: ${{ steps.bump.outputs.previous }}
      msi_name: ${{ steps.names.outputs.msi_name }}
      id: ${{ steps.names.outputs.id }}
    steps:
      - uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # commitizen plus an editable --no-deps install so the SubsearchCz
      # plugin named in [tool.commitizen] is registered (via entry points)
      # without pulling in the full app runtime dependencies.
      - name: Install commitizen
        run: |
          python -m pip install --upgrade pip commitizen
          python -m pip install -e . --no-deps

      - name: Bump version from conventional commits
        id: bump
        run: |
          $previous = cz version --project
          # cz bump exits non-zero ("NoneIncrementError") when no commits warrant
          # a release; treat that as a no-op rather than a failure.
          cz bump --yes
          if ($LASTEXITCODE -ne 0) { Write-Host "No version bump required."; $LASTEXITCODE = 0 }
          $current = cz version --project
          "previous=$previous" >> $env:GITHUB_OUTPUT
          "current=$current" >> $env:GITHUB_OUTPUT
          if ($previous -ne $current) {
            "bumped=true" >> $env:GITHUB_OUTPUT
          } else {
            "bumped=false" >> $env:GITHUB_OUTPUT
          }

      - name: Build artifact names
        id: names
        if: ${{ steps.bump.outputs.bumped == 'true' }}
        run: |
          $v = "${{ steps.bump.outputs.current }}"
          "msi_name=Subsearch-$v-win64.msi" >> $env:GITHUB_OUTPUT
          "id=${v}_${{ github.ref_name }}_${{ github.run_id }}" >> $env:GITHUB_OUTPUT

      - name: Track previous and last stable release
        if: ${{ steps.bump.outputs.bumped == 'true' }}
        run: |
          ${{ env.CLI }} json -w previous_version ${{ steps.bump.outputs.previous }}
          ${{ env.CLI }} json -w last_stable_release ${{ steps.bump.outputs.current }}
          git add ${{ env.VERSION_CONTROL_PATH }}
          # Fold the tracking fields into the tagged bump commit, then move the
          # annotated tag cz created onto the amended commit.
          git commit --amend --no-edit -S
          git tag -f -a ${{ steps.bump.outputs.current }} -m "Release ${{ steps.bump.outputs.current }}"

      - name: Push release commit and tag
        if: ${{ steps.bump.outputs.bumped == 'true' }}
        run: |
          git push origin HEAD:${{ github.ref_name }} --follow-tags

  build_binaries:
    name: Build binaries
    needs: init
    if: ${{ needs.init.outputs.bumped == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 10
    outputs:
      msi_hash: ${{ steps.hashes.outputs.msi_hash }}
      exe_hash: ${{ steps.hashes.outputs.exe_hash }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build binaries
        id: build
        run: |
          git fetch origin ${{ github.ref_name }}
          python -m pip install --upgrade pip
          pip install -e .[build]
          python -m tools.build bdist_msi

      - name: Create hashes file and set outputs
        id: hashes
        run: ${{ env.CLI }} binaries --write-hash # suffix_hash=value

      - name: Prepare artifacts
        run: ${{ env.CLI }} binaries --prepare-build-artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build_${{ needs.init.outputs.id }}
          path: artifacts
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  test_binaries:
    name: Test binaries
    needs: [init, build_binaries]
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "*"

      - uses: actions/download-artifact@v4
        id: download
        with:
          name: build_${{ needs.init.outputs.id }}
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: ${{ steps.download.outputs.download-path }}

      - run: python -m tools.github_actions.jobs.test_binaries

  upload_binaries:
    name: Upload binaries to virustotal
    needs: [init, build_binaries]
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@v4
        id: download
        with:
          name: build_${{ needs.init.outputs.id }}
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: ${{ steps.download.outputs.download-path }}

      - uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          github_token: ${{ secrets.ACTIONS_TOKEN }}
          update_release_body: false
          request_rate: 4
          files: |
            artifacts/Subsearch.exe
            artifacts/${{ needs.init.outputs.msi_name }}

  changelog:
    name: Changelog
    needs: [init, build_binaries]
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # commitizen plus an editable --no-deps install registers the
      # SubsearchCz plugin (tools/cz_subsearch.py) that builds the changelog
      # from conventional commits: emoji sections with per-commit links.
      - name: Install commitizen plugin
        run: |
          python -m pip install --upgrade pip commitizen
          python -m pip install -e . --no-deps

      - name: Build changelog from conventional commits
        run: |
          mkdir "artifacts"
          git fetch origin ${{ github.ref_name }} --tags
          cz changelog ${{ needs.init.outputs.current_tags }} --file-name artifacts/${{ env.CHANGELOG_NAME }}

      - name: Update
        run: >
          ${{ env.CLI }} changelog
          --tags "${{ needs.init.outputs.current_tags }};${{ needs.init.outputs.last_stable_release }}"
          --file-names "${{ needs.init.outputs.msi_name }};Subsearch.exe"
          --hashes "${{ needs.build_binaries.outputs.msi_hash }};${{ needs.build_binaries.outputs.exe_hash }}"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog_${{ needs.init.outputs.id }}
          path: artifacts
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  open_main_pr:
    name: Open pull request to main
    needs: [init, test_binaries, changelog]
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        id: download
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: ${{ steps.download.outputs.download-path }}

      - name: Open PR (manual merge)
        run: |
          $changelogTitle = "Release ${{ needs.init.outputs.current_tags }}"
          $changelogBody = Get-Content -Raw "artifacts\changelog_${{ needs.init.outputs.id }}\${{ env.CHANGELOG_NAME }}"
          git fetch --all
          gh pr create -B main -H dev -t "$changelogTitle" -b "$changelogBody" -l "release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_github:
    name: Publish to github
    needs: [init, test_binaries, changelog]
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@v4
        id: download
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: ${{ steps.download.outputs.download-path }}

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.init.outputs.current_tags }}
          tag_name: ${{ needs.init.outputs.current_tags }}
          body_path: artifacts/changelog_${{ needs.init.outputs.id }}/${{ env.CHANGELOG_NAME }}
          token: ${{ secrets.ACTIONS_TOKEN }}
          prerelease: false
          files: |
            artifacts/build_${{ needs.init.outputs.id }}/${{ env.HASHES_NAME }}
            artifacts/build_${{ needs.init.outputs.id }}/${{ needs.init.outputs.msi_name }}

  publish_pypi:
    name: Publish to pypi
    needs: [init, test_binaries]
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install requirements
        run: |
          git fetch origin ${{ github.ref_name }}
          python -m pip install --upgrade --disable-pip-version-check pip
          python -m pip install --upgrade build twine

      - name: Build wheel and source distributions
        run: |
          python -m build

      - name: Upload to pypi
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine upload --verbose -u '__token__' dist/*
