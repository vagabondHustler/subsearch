name: Configure SSH commit signing
description: Install the CI SSH signing key and configure git to sign commits and tags

inputs:
  signing-key:
    description: Private SSH key used to sign commits and tags
    required: true
  user-name:
    description: Git author name
    default: vagabondHustler
  user-email:
    description: Git author email (must be a verified GitHub email for the Verified badge)
    default: 92130287+vagabondHustler@users.noreply.github.com

runs:
  using: composite
  steps:
    - shell: bash
      env:
        SIGNING_KEY: ${{ inputs.signing-key }}
      run: |
        mkdir -p ~/.ssh
        printf '%s\n' "$SIGNING_KEY" > ~/.ssh/ci_signing
        chmod 600 ~/.ssh/ci_signing
        ssh-keygen -y -f ~/.ssh/ci_signing > ~/.ssh/ci_signing.pub
        git config --global user.name "${{ inputs.user-name }}"
        git config --global user.email "${{ inputs.user-email }}"
        git config --global gpg.format ssh
        git config --global user.signingkey ~/.ssh/ci_signing.pub
        git config --global commit.gpgsign true
        git config --global tag.gpgsign true
