name: Install build dependencies
description: Install build extras and run make_msi

inputs:
  dry-run-version:
    description: Version string to use for dry-run MSI builds (omit for real releases)
    default: ""

runs:
  using: composite
  steps:
    - run: |
        python -m pip install --upgrade pip
        pip install -e .[build]
      shell: pwsh

    - run: python .github/workflows/scripts/jobs.py make_msi
      shell: pwsh
      env:
        DRY_RUN_VERSION: ${{ inputs.dry-run-version }}
